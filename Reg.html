<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Коробки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);">
        <div class="container">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                    <rect x="5" y="5" width="40" height="40" rx="8" fill="#ffffff" opacity="0.2"/>
                    <path d="M15 25 L22 32 L35 19" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <a class="navbar-brand fw-bold" href="#">Корочки.есть</a>
            </div>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="Auth.html">Вход</a>
                <a class="nav-link active fw-semibold" href="Reg.html">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0" style="border-radius: 16px; overflow: hidden;">
                    <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);">
                        <h4 class="mb-0 fw-bold">Регистрация пользователя</h4>
                    </div>
                    <div class="card-body p-5">
                        <form id="registrationForm">
                            <div class="mb-4">
                                <label for="login" class="form-label fw-semibold">Логин (латиница и цифры, мин. 6 символов)</label>
                                <input type="text" class="form-control" id="login" name="login" 
                                       pattern="[a-zA-Z0-9]{6,}" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                                <div class="form-text text-muted">Только латинские буквы и цифры</div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Пароль (мин. 8 символов)</label>
                                <input type="password" class="form-control" id="password" name="password" 
                                       minlength="8" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                            </div>

                            <div class="mb-4">
                                <label for="fio" class="form-label fw-semibold">ФИО (кириллица и пробелы)</label>
                                <input type="text" class="form-control" id="fio" name="fio" 
                                       pattern="[а-яА-ЯёЁ\s]+" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                            </div>

                            <div class="mb-4">
                                <label for="phone" class="form-label fw-semibold">Телефон</label>
                                <input type="tel" class="form-control" id="phone" name="phone" 
                                       placeholder="8(XXX)XXX-XX-XX" 
                                       pattern="8\(\d{3}\)\d{3}-\d{2}-\d{2}" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                            </div>

                            <div class="mb-4">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn text-white fw-semibold py-2" style="background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); border-radius: 10px; font-size: 1.05rem; box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.3);">Зарегистрироваться</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center py-4 bg-light">
                        <small class="text-muted">Уже зарегистрированы? <a href="Auth.html" class="text-decoration-none fw-semibold" style="color: #7c3aed;">Войти</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

   
</body>
</html>
