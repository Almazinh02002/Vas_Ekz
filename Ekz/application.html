<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать заявку - Коробки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Корочки.есть</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Мои заявки</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-semibold" href="application.html">Создать заявку</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="auth.html">Выйти</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="card shadow-lg border-0" style="border-radius: 16px; overflow: hidden;">
                    <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);">
                        <h4 class="mb-0 fw-bold">Формирование заявки на обучение</h4>
                    </div>
                    <div class="card-body p-5">
                        <form id="requestForm">
                            <div class="mb-4">
                                <label for="courseName" class="form-label fw-semibold">Наименование курса *</label>
                                <input type="text" class="form-control" id="courseName" name="courseName" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                                <div class="form-text text-muted">Введите полное название курса</div>
                            </div>

                            <div class="mb-4">
                                <label for="startDate" class="form-label fw-semibold">Желаемая дата начала обучения *</label>
                                <input type="date" class="form-control" id="startDate" name="startDate" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Способ оплаты *</label>
                                <div class="mt-3">
                                    <div class="form-check form-check-inline mb-2">
                                        <input class="form-check-input" type="radio" name="paymentMethod" 
                                               id="paymentCash" value="cash" required style="accent-color: #7c3aed;">
                                        <label class="form-check-label" for="paymentCash">
                                            Наличными
                                        </label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="paymentMethod" 
                                               id="paymentTransfer" value="transfer" required style="accent-color: #7c3aed;">
                                        <label class="form-check-label" for="paymentTransfer">
                                            Переводом по номеру телефона
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4" id="phoneTransferField" style="display: none;">
                                <label for="phoneForTransfer" class="form-label fw-semibold">Номер телефона для перевода</label>
                                <input type="tel" class="form-control" id="phoneForTransfer" 
                                       placeholder="8(XXX)XXX-XX-XX" style="border-radius: 10px; border: 2px solid #e9d5ff;">
                            </div>

                            <div class="alert border-0 shadow-sm" style="background-color: #f3e8ff; color: #6b21a8; border-left: 4px solid #7c3aed;">
                                <strong>Важно!</strong> После отправки заявка получит статус "Новая". 
                                Администратор рассмотрит её в ближайшее время.
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a href="dashboard.html" class="btn btn-secondary">Отмена</a>
                                <button type="submit" class="btn text-white fw-semibold" style="background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.3);">Отправить заявку</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
