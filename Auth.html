<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Коробки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Корочки.есть</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active fw-semibold" href="auth.html">Вход</a>
                <a class="nav-link" href="Reg.html">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0" style="border-radius: 16px; overflow: hidden;">
                    <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);">
                        <h4 class="mb-0 fw-bold">Вход в систему</h4>
                    </div>
                    <div class="card-body p-5">
                        <form id="loginForm">
                            <div class="mb-4">
                                <label for="login" class="form-label fw-semibold">Логин</label>
                                <input type="text" class="form-control" id="login" name="login" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Пароль</label>
                                <input type="password" class="form-control" id="password" name="password" required style="border-radius: 10px; border: 2px solid #e9d5ff;">
                            </div>

                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="remember" style="accent-color: #7c3aed;">
                                <label class="form-check-label" for="remember">Запомнить меня</label>
                            </div>

                            <div id="errorMsg" class="alert alert-danger d-none"></div>

                            <div class="d-grid gap-2 mt-4">
                                <a href="Main.html" class="btn text-white fw-semibold py-2" style="background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); border-radius: 10px; font-size: 1.05rem; box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.3);">Войти</a>
                                <a href="Admin.html" class="btn text-white fw-semibold py-2" style="background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); border-radius: 10px; font-size: 1.05rem; box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.3);">Как админ</a>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center py-4 bg-light">
                        <small class="text-muted">Еще не зарегистрированы? <a href="Reg.html" class="text-decoration-none fw-semibold" style="color: #7c3aed;">Регистрация</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
